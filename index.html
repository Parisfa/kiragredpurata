<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kira Purata GPI Markah Subjek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 20px; 
            min-height: 100vh; 
            position: relative; 
            font-size: 16px;
            overflow-x: hidden;
        }
        
        /* Animated Gradient Background - Blue Theme */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #1e3c72, #2a5298, #667eea, #764ba2);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 15s infinite ease-in-out;
            z-index: -1;
        }
        
        .orb1 {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .orb2 {
            width: 300px;
            height: 300px;
            top: 50%;
            right: 5%;
            animation-delay: -5s;
        }
        
        .orb3 {
            width: 150px;
            height: 150px;
            bottom: 10%;
            left: 30%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        /* Title */
        h1 { 
            color: #ffffff; 
            text-align: center; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
            font-size: 2em;
            margin: 30px 0 20px;
            animation: slideDown 0.8s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Form */
        form { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            max-width: 600px; 
            margin: 0 auto 20px; 
            width: 100%;
            animation: slideUp 0.8s ease-out 0.2s both;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Labels */
        label { 
            display: block; 
            margin: 15px 0 8px; 
            font-weight: 600; 
            font-size: 1em;
            color: #333;
        }
        
        /* Inputs */
        input { 
            padding: 14px; 
            width: 100%; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f5f5f5;
        }
        
        input:focus { 
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 15px rgba(42, 82, 152, 0.3);
            background: #fff;
        }
        
        input:hover { 
            border-color: #bbb;
        }
        
        /* Button */
        button { 
            padding: 16px 30px; 
            background: linear-gradient(135deg, #2a5298, #1e3c72); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease; 
            width: 100%; 
            margin-top: 20px;
        }
        
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 25px rgba(42, 82, 152, 0.4); 
        }
        
        button:active { 
            transform: scale(0.98); 
        }
        
        /* Result */
        #hasil { 
            display: none;
            margin-top: 20px; 
            padding: 25px; 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
            max-width: 600px; 
            margin: 20px auto; 
            width: 100%;
            animation: popIn 0.5s ease-out;
        }
        
        #hasil.show {
            display: block;
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        #hasil p { 
            text-align: center; 
            font-size: 1.2em;
            margin: 10px 0;
            color: #333;
        }
        
        #hasil strong {
            color: #2a5298;
            font-size: 1.5em;
        }
        
        /* Description */
        .desc { 
            text-align: center; 
            font-size: 1.1em;
            color: #fff;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            body { margin: 10px; }
            h1 { font-size: 1.5em; margin: 20px 0 15px; }
            form { padding: 20px; }
            label { margin: 12px 0 6px; }
            input { padding: 12px; }
            button { padding: 14px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <h1>Kira Purata Nilai GPI</h1>
    <p class="desc">Sila masukkan markah (dalam peratus, 0-100) untuk setiap subjek:</p>
    
    <form id="markahForm">
        <label for="bahasa_melayu">Bahasa Melayu (%):</label>
        <input type="number" id="bahasa_melayu" min="0" max="100" required>
        
        <label for="bahasa_english">Bahasa English (%):</label>
        <input type="number" id="bahasa_english" min="0" max="100" required>
        
        <label for="matematik">Matematik (%):</label>
        <input type="number" id="matematik" min="0" max="100" required>
        
        <label for="sains">Sains (%):</label>
        <input type="number" id="sains" min="0" max="100" required>
        
        <label for="sejarah">Sejarah (%):</label>
        <input type="number" id="sejarah" min="0" max="100" required>
        
        <label for="geografi">Geografi (%):</label>
        <input type="number" id="geografi" min="0" max="100" required>
        
        <label for="reka_bentuk">Reka Bentuk dan Teknologi (%):</label>
        <input type="number" id="reka_bentuk" min="0" max="100" required>
        
        <label for="pendidikan_islam">Pendidikan Islam/Bahasa Cina (%):</label>
        <input type="number" id="pendidikan_islam" min="0" max="100" required>
        
        <button type="button" onclick="kiraPurata()">Kira Purata GPI</button>
    </form>
    
    <div id="hasil"></div>
    
    <script>
        function hitungNilaiNumerik(markah) {
            if (markah >= 82 && markah <= 100) return 1;
            if (markah >= 66 && markah <= 81) return 2;
            if (markah >= 50 && markah <= 65) return 3;
            if (markah >= 35 && markah <= 49) return 4;
            if (markah >= 20 && markah <= 34) return 5;
            if (markah >= 0 && markah <= 19) return 6;
            return null;
        }
        
        function kiraPurata() {
            var subjek = [
                { nama: "Bahasa Melayu", id: "bahasa_melayu" },
                { nama: "Bahasa English", id: "bahasa_english" },
                { nama: "Matematik", id: "matematik" },
                { nama: "Sains", id: "sains" },
                { nama: "Sejarah", id: "sejarah" },
                { nama: "Geografi", id: "geografi" },
                { nama: "Reka Bentuk dan Teknologi", id: "reka_bentuk" },
                { nama: "Pendidikan Islam", id: "pendidikan_islam" }
            ];
            
            var totalNilaiNumerik = 0;
            var semuaValid = true;
            
            for (var i = 0; i < subjek.length; i++) {
                var sub = subjek[i];
                var markah = parseFloat(document.getElementById(sub.id).value);
                
                if (isNaN(markah) || markah < 0 || markah > 100) {
                    alert("Markah untuk " + sub.nama + " mestilah antara 0 dan 100.");
                    document.getElementById(sub.id).focus();
                    semuaValid = false;
                    break;
                }
                
                var nilaiNumerik = hitungNilaiNumerik(markah);
                if (nilaiNumerik === null) {
                    alert("Markah untuk " + sub.nama + " tidak valid.");
                    semuaValid = false;
                    break;
                }
                
                totalNilaiNumerik += nilaiNumerik;
            }
            
            if (!semuaValid) return;
            
            var purata = totalNilaiNumerik / 8;
            
            var ringkasan = "<p><strong>Purata GPI: " + purata.toFixed(2) + "</strong></p>";
            
            var hasilDiv = document.getElementById("hasil");
            hasilDiv.innerHTML = ringkasan;
            hasilDiv.classList.remove("show");
            
            void hasilDiv.offsetWidth;
            hasilDiv.classList.add("show");
        }

        var inputIds = ["bahasa_melayu", "bahasa_english", "matematik", "sains", "sejarah", "geografi", "reka_bentuk", "pendidikan_islam"];
        inputIds.forEach(function(id, index) {
            document.getElementById(id).addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    var nextIndex = index + 1;
                    if (nextIndex < inputIds.length) {
                        document.getElementById(inputIds[nextIndex]).focus();
                    } else {
                        document.querySelector("button").focus();
                    }
                }
            });
        });
    </script>
</body>
</html>
