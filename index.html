<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kira Gred Purata (GPI)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            touch-action: manipulation;
        }
        
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            position: relative; 
            font-size: 16px;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* Gradient Background - Animasi Sentiasa ON */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #1e3c72, #2a5298, #667eea, #764ba2);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Floating Orbs - Animasi Sentiasa ON */
        .orb {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            animation: floatOrb 15s infinite ease-in-out;
            z-index: -1;
        }
        
        .orb1 {
            width: 200px;
            height: 200px;
            top: 5%;
            left: 5%;
            animation-delay: 0s;
        }
        
        .orb2 {
            width: 300px;
            height: 300px;
            top: 50%;
            right: -10%;
            animation-delay: -5s;
        }
        
        .orb3 {
            width: 150px;
            height: 150px;
            bottom: 5%;
            left: 25%;
            animation-delay: -10s;
        }
        
        @keyframes floatOrb {
            0%, 100% { 
                transform: translate(0, 0) scale(1); 
            }
            33% { 
                transform: translate(30px, -40px) scale(1.1); 
            }
            66% { 
                transform: translate(-20px, 20px) scale(0.95); 
            }
        }
        
        /* Title Animation */
        h1 { 
            color: #ffffff; 
            text-align: center; 
            font-size: 1.6em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: slideDown 0.6s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Form Animation */
        form { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
            max-width: 500px; 
            margin: 0 auto;
            animation: slideUp 0.6s ease-out 0.2s both;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        label { 
            display: block; 
            margin: 12px 0 6px; 
            font-weight: 600; 
            font-size: 0.95em;
            color: #333;
        }
        
        input { 
            padding: 16px 14px; 
            width: 100%; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f8f8f8;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus { 
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.15);
            background: #fff;
        }
        
        /* Error Animation - Shake */
        input.error { 
            border-color: #e74c3c;
            background: #fff;
            animation: shake 0.4s ease;
        }
        
        input.error:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.15);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        
        button { 
            padding: 18px 30px; 
            background: linear-gradient(135deg, #2a5298, #1e3c72); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 17px; 
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s; 
            width: 100%; 
            margin-top: 24px;
        }
        
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 82, 152, 0.35);
        }
        
        button:active { 
            transform: scale(0.98); 
        }
        
        /* Result Animation - Pop In */
        #hasil { 
            display: none;
            margin-top: 20px; 
            padding: 24px; 
            background: rgba(255, 255, 255, 0.98); 
            border-radius: 16px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
            max-width: 500px; 
            margin-left: auto;
            margin-right: auto;
        }
        
        #hasil.show {
            display: block;
            animation: popIn 0.4s ease-out;
        }
        
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        #hasil p { 
            text-align: center; 
            font-size: 1.3em;
            color: #333;
        }
        
        #hasil strong {
            color: #2a5298;
            font-size: 1.6em;
        }
        
        @media (max-width: 480px) {
            body { padding: 15px; }
            h1 { font-size: 1.4em; }
            form { padding: 16px; border-radius: 14px; }
            label { margin: 14px 0 6px; font-size: 0.9em; }
            input { padding: 14px 12px; font-size: 16px; border-radius: 10px; }
            button { padding: 16px; font-size: 16px; margin-top: 20px; border-radius: 10px; }
            #hasil { padding: 20px; }
            #hasil p { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <h1>Kira Gred Purata (GPI)</h1>
    
    <form id="markahForm">
        <label for="bahasa_melayu">Bahasa Melayu (%):</label>
        <input type="number" id="bahasa_melayu" min="0" max="100" inputmode="numeric">
        
        <label for="bahasa_english">Bahasa English (%):</label>
        <input type="number" id="bahasa_english" min="0" max="100" inputmode="numeric">
        
        <label for="matematik">Matematik (%):</label>
        <input type="number" id="matematik" min="0" max="100" inputmode="numeric">
        
        <label for="sains">Sains (%):</label>
        <input type="number" id="sains" min="0" max="100" inputmode="numeric">
        
        <label for="sejarah">Sejarah (%):</label>
        <input type="number" id="sejarah" min="0" max="100" inputmode="numeric">
        
        <label for="geografi">Geografi (%):</label>
        <input type="number" id="geografi" min="0" max="100" inputmode="numeric">
        
        <label for="reka_bentuk">Reka Bentuk dan Teknologi (%):</label>
        <input type="number" id="reka_bentuk" min="0" max="100" inputmode="numeric">
        
        <label for="pendidikan_islam">Pendidikan Islam/Bahasa Cina/Pendidikan Moral (%):</label>
        <input type="number" id="pendidikan_islam" min="0" max="100" inputmode="numeric">
        
        <button type="button" onclick="kiraPurata()">Kira Purata GPI</button>
    </form>
    
    <div id="hasil"></div>
    
    <script>
        function hitungNilaiNumerik(markah) {
            if (markah >= 82 && markah <= 100) return 1;
            if (markah >= 66 && markah <= 81) return 2;
            if (markah >= 50 && markah <= 65) return 3;
            if (markah >= 35 && markah <= 49) return 4;
            if (markah >= 20 && markah <= 34) return 5;
            if (markah >= 0 && markah <= 19) return 6;
            return null;
        }
        
        function kiraPurata() {
            var subjek = [
                { nama: "Bahasa Melayu", id: "bahasa_melayu" },
                { nama: "Bahasa English", id: "bahasa_english" },
                { nama: "Matematik", id: "matematik" },
                { nama: "Sains", id: "sains" },
                { nama: "Sejarah", id: "sejarah" },
                { nama: "Geografi", id: "geografi" },
                { nama: "Reka Bentuk dan Teknologi", id: "reka_bentuk" },
                { nama: "Pendidikan Islam/Bahasa Cina/Pendidikan Moral", id: "pendidikan_islam" }
            ];
            
            var totalNilaiNumerik = 0;
            var semuaValid = true;
            
            // Reset error
            var semuaInput = document.querySelectorAll("input");
            semuaInput.forEach(function(input) {
                input.classList.remove("error");
            });
            
            for (var i = 0; i < subjek.length; i++) {
                var sub = subjek[i];
                var inputEl = document.getElementById(sub.id);
                var markah = inputEl.value.trim();
                
                if (markah === "" || isNaN(markah)) {
                    inputEl.classList.add("error");
                    semuaValid = false;
                    continue;
                }
                
                markah = parseFloat(markah);
                
                if (markah < 0 || markah > 100) {
                    inputEl.classList.add("error");
                    semuaValid = false;
                    continue;
                }
                
                var nilaiNumerik = hitungNilaiNumerik(markah);
                if (nilaiNumerik === null) {
                    inputEl.classList.add("error");
                    semuaValid = false;
                    continue;
                }
                
                totalNilaiNumerik += nilaiNumerik;
            }
            
            if (!semuaValid) return;
            
            var purata = totalNilaiNumerik / 8;
            
            var ringkasan = "<p><strong>Purata GPI: " + purata.toFixed(2) + "</strong></p>";
            
            var hasilDiv = document.getElementById("hasil");
            hasilDiv.innerHTML = ringkasan;
            hasilDiv.classList.remove("show");
            
            void hasilDiv.offsetWidth;
            hasilDiv.classList.add("show");
            
            hasilDiv.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
        
        var inputIds = ["bahasa_melayu", "bahasa_english", "matematik", "sains", "sejarah", "geografi", "reka_bentuk", "pendidikan_islam"];
        inputIds.forEach(function(id, index) {
            document.getElementById(id).addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    this.classList.remove("error");
                    
                    var nextIndex = index + 1;
                    if (nextIndex < inputIds.length) {
                        document.getElementById(inputIds[nextIndex]).focus();
                    } else {
                        kiraPurata();
                    }
                }
            });
            
            document.getElementById(id).addEventListener("input", function() {
                this.classList.remove("error");
            });
        });
    </script>
</body>
</html>
